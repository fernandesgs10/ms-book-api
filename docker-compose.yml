version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: quarkus-mysql-permanente
    ports:
      - "3306:3306"
    environment:
      MYSQL_USER: quarkus_user
      MYSQL_PASSWORD: quarkus_pass
      MYSQL_DATABASE: quarkus_db
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - quarkus-network

  zeebe:
    image: camunda/zeebe:8.5.0
    container_name: zeebe-broker
    ports:
      - "26500:26500"
      - "9600:9600"
    environment:
      ZEEBE_BROKER_NETWORK_HOST: 0.0.0.0
      ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME: io.camunda.zeebe.exporter.ElasticsearchExporter
      ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_URL: http://elasticsearch:9200
    volumes:
      - zeebe-data:/usr/local/zeebe/data
    depends_on:
      - elasticsearch
    networks:
      - quarkus-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: camunda-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - quarkus-network

  operate:
    image: camunda/operate:8.5.0
    container_name: camunda-operate
    ports:
      - "8082:8080"
    environment:
      CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS: zeebe:26500
      CAMUNDA_OPERATE_ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      - zeebe
      - elasticsearch
    networks:
      - quarkus-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: quarkus-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql
    networks:
      - quarkus-network

networks:
  quarkus-network:
    driver: bridge

volumes:
  mysql-data:
  zeebe-data:
  elasticsearch-data: