# =====================================
# Configurań§es do Quarkus
# =====================================

# Desabilita Dev Services (para usar nosso Docker Compose)
quarkus.datasource.devservices.enabled=false

# Porta da aplicańŃo
quarkus.http.port=8080

# =====================================
# Configurań§es do banco de dados MySQL
# =====================================

quarkus.datasource.db-kind=mysql
quarkus.datasource.username=quarkus_user
quarkus.datasource.password=quarkus_pass
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/quarkus_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8

# Pool de conex§es
quarkus.datasource.jdbc.max-size=16
quarkus.datasource.jdbc.min-size=4

# =====================================
# Configurań§es do Hibernate
# =====================================

# GerańŃo automßtica das tabelas
quarkus.hibernate-orm.database.generation=update

# Mostrar SQL no console
quarkus.hibernate-orm.log.sql=true

# Formatar SQL
quarkus.hibernate-orm.log.format-sql=true

# Script inicial
quarkus.hibernate-orm.sql-load-script=import.sql

# Timezone
quarkus.hibernate-orm.jdbc.timezone=UTC

# Dialeto MySQL
quarkus.hibernate-orm.dialect=org.hibernate.dialect.MySQLDialect

# =====================================
# ConfigurańŃo do Camunda 8 / Zeebe
# =====================================

zeebe.client.broker.gateway-address=localhost:26500
zeebe.client.security.plaintext=true

# Timeout das operań§es
zeebe.client.request-timeout=10s

# Worker threads
zeebe.client.worker.max-jobs-active=32

# =====================================
# CORS (para frontend React ou Angular)
# =====================================

quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=location,info