# =========================
# SERVER
# =========================
quarkus.http.port=${PORT:8080}
quarkus.http.host=0.0.0.0

# =========================
# DATABASE (MYSQL)
# =========================
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:quarkus_user}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:quarkus_pass}

# ?? IMPORTANTE: dentro do Docker NÃO é localhost
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:mysql://mysql:3306/quarkus_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}

quarkus.datasource.jdbc.min-size=0
quarkus.datasource.jdbc.max-size=10
quarkus.datasource.jdbc.acquisition-timeout=PT30S
quarkus.datasource.jdbc.background-validation-interval=PT10S
quarkus.datasource.jdbc.validation-query-sql=SELECT 1

# =========================
# HIBERNATE
# =========================
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true
quarkus.hibernate-orm.jdbc.timezone=UTC
quarkus.hibernate-orm.dialect=org.hibernate.dialect.MySQL8Dialect

# =========================
# ZEEBE (CAMUNDA 8)
# =========================
# ?? CRÍTICO: nome do serviço no docker-compose
zeebe.client.broker.gateway-address=${ZEEBE_CLIENT_BROKER_GATEWAY_ADDRESS:zeebe:26500}

zeebe.client.security.plaintext=true
zeebe.client.request-timeout=30s
zeebe.client.worker.max-jobs-active=32

# =========================
# LOGS (DEBUG PRA DIAGNÓSTICO)
# =========================
quarkus.log.level=INFO
quarkus.log.category."io.camunda".level=DEBUG
quarkus.log.category."io.zeebe".level=DEBUG

# =========================
# SWAGGER / OPENAPI
# =========================
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

quarkus.smallrye-openapi.enable=true
quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.info-title=Book Management API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API para gerenciamento de biblioteca

# =========================
# CORS
# =========================
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=location,info

# =========================
# BANNER
# =========================
quarkus.banner.enabled=true
quarkus.banner.path=banner.txt